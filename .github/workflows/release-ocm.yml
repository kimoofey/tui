name: release-ocm

on:
  push:
    tags:
      - 'ocm/v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Parse version
        run: echo "VERSION=${GITHUB_REF_NAME#ocm/v}" >> $GITHUB_ENV

      - name: Build binaries
        run: |
          mkdir -p dist/arm64 dist/amd64
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build \
            -ldflags "-s -w -X main.version=$VERSION" \
            -o dist/arm64/ocm ./cmd/ocm
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build \
            -ldflags "-s -w -X main.version=$VERSION" \
            -o dist/amd64/ocm ./cmd/ocm

      - name: Package archives
        run: |
          (cd dist/arm64 && tar czf ../ocm_${VERSION}_darwin_arm64.tar.gz ocm)
          (cd dist/amd64 && tar czf ../ocm_${VERSION}_darwin_amd64.tar.gz ocm)
          cd dist
          shasum -a 256 ocm_${VERSION}_darwin_arm64.tar.gz ocm_${VERSION}_darwin_amd64.tar.gz \
            > ocm_${VERSION}_checksums.txt

      - uses: sigstore/cosign-installer@v3

      - name: Sign artifacts with cosign
        run: |
          cosign sign-blob --yes \
            --bundle dist/ocm_${VERSION}_darwin_arm64.tar.gz.bundle \
            dist/ocm_${VERSION}_darwin_arm64.tar.gz
          cosign sign-blob --yes \
            --bundle dist/ocm_${VERSION}_darwin_amd64.tar.gz.bundle \
            dist/ocm_${VERSION}_darwin_amd64.tar.gz

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/ocm_${{ env.VERSION }}_darwin_arm64.tar.gz
            dist/ocm_${{ env.VERSION }}_darwin_amd64.tar.gz

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREV_TAG=$(git tag --list 'ocm/v*' --sort=-version:refname | sed -n '2p')
          NOTES=$(git log ${PREV_TAG:+$PREV_TAG..HEAD} --oneline -- cmd/ocm/ ocm/ internal/ui/)
          if [ -z "$NOTES" ]; then
            NOTES="Release ocm v${VERSION}"
          fi
          NOTES=$(echo "$NOTES" | sed 's/^[a-f0-9]* /- /')
          VERIFY=$(cat <<'EOF'

          ## Verify

          Install [cosign](https://github.com/sigstore/cosign) and run:
          ```
          cosign verify-blob --bundle ocm_VERSION_darwin_arm64.tar.gz.bundle \
            --certificate-identity-regexp 'https://github.com/kimoofey/tui/' \
            --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
            ocm_VERSION_darwin_arm64.tar.gz
          ```

          Or use the [GitHub CLI](https://cli.github.com):
          ```
          gh attestation verify ocm_VERSION_darwin_arm64.tar.gz -o kimoofey
          ```
          EOF
          )
          VERIFY="${VERIFY//VERSION/$VERSION}"
          gh release create "$GITHUB_REF_NAME" \
            --title "ocm v${VERSION}" \
            --notes "${NOTES}${VERIFY}" \
            dist/ocm_${VERSION}_darwin_arm64.tar.gz \
            dist/ocm_${VERSION}_darwin_amd64.tar.gz \
            dist/ocm_${VERSION}_checksums.txt \
            dist/ocm_${VERSION}_darwin_arm64.tar.gz.bundle \
            dist/ocm_${VERSION}_darwin_amd64.tar.gz.bundle

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          SHA_ARM=$(shasum -a 256 dist/ocm_${VERSION}_darwin_arm64.tar.gz | awk '{print $1}')
          SHA_AMD=$(shasum -a 256 dist/ocm_${VERSION}_darwin_amd64.tar.gz | awk '{print $1}')

          cat > /tmp/ocm.rb << CASK
          cask "ocm" do
            version "${VERSION}"

            if Hardware::CPU.arm?
              sha256 "${SHA_ARM}"
              url "https://github.com/kimoofey/tui/releases/download/ocm/v#{version}/ocm_#{version}_darwin_arm64.tar.gz",
                  verified: "github.com/kimoofey/tui/"
            else
              sha256 "${SHA_AMD}"
              url "https://github.com/kimoofey/tui/releases/download/ocm/v#{version}/ocm_#{version}_darwin_amd64.tar.gz",
                  verified: "github.com/kimoofey/tui/"
            end

            name "ocm"
            desc "Interactive TUI for browsing OpenCode sessions"
            homepage "https://github.com/kimoofey/tui"

            binary "ocm"

            postflight do
              system_command "/usr/bin/xattr",
                             args: ["-dr", "com.apple.quarantine", "#{staged_path}/ocm"]
            end
          end
          CASK

          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/kimoofey/homebrew-tap.git /tmp/tap
          mkdir -p /tmp/tap/Casks
          cp /tmp/ocm.rb /tmp/tap/Casks/ocm.rb
          cd /tmp/tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/ocm.rb
          git commit -m "ocm ${VERSION}"
          git push
